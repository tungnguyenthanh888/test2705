spring:
  application:
    name: order-service
  datasource:
    url: jdbc:postgresql://localhost:5432/order_db
    username: postgres
    password: 123456
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
eureka:
  instance:
    hostname: localhost
    port: 8671
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      default: http://${eureka.instance.hostname}:${eureka.instance.port}/eureka/

server:
  port: 8081