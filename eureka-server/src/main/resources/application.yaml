spring:
  application:
    name: eureka-server
server:
  port: 8761 # Cổng mặc định huyền thoại của Eureka Server

eureka:
  instance:
    hostname: localhost
  client:
    register-with-eureka: false
    fetch-registry: false
    service-url:
      default: http://${eureka.instance.hostname}:${server.port}/eureka/